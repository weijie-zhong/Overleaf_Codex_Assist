<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Overleaf Assist Desktop</title>
    <style>
      :root {
        color-scheme: dark;
        --bg: #08111a;
        --panel: #0f1c2a;
        --panel-2: #132437;
        --line: #27415e;
        --text: #d8e7f8;
        --muted: #94abc7;
        --accent: #5ec2ff;
        --good: #86efac;
        --warn: #fde68a;
        --bad: #fca5a5;
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        min-height: 100vh;
        font: 13px/1.45 "Segoe UI", Tahoma, sans-serif;
        background:
          radial-gradient(circle at top left, rgba(94, 194, 255, 0.12), transparent 28%),
          linear-gradient(180deg, #0a1521 0%, #060d15 100%);
        color: var(--text);
      }

      .app-shell {
        display: grid;
        grid-template-rows: auto auto 1fr;
        min-height: 100vh;
      }

      .topbar {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 16px;
        padding: 18px 22px 14px;
        border-bottom: 1px solid rgba(39, 65, 94, 0.6);
        background: rgba(7, 15, 23, 0.72);
        backdrop-filter: blur(10px);
      }

      .brand h1 {
        margin: 0;
        font-size: 22px;
        font-weight: 700;
      }

      .brand p {
        margin: 4px 0 0;
        color: var(--muted);
      }

      .top-meta {
        display: flex;
        align-items: center;
        gap: 10px;
        color: var(--muted);
      }

      .badge {
        display: inline-flex;
        align-items: center;
        padding: 4px 10px;
        border-radius: 999px;
        border: 1px solid rgba(94, 194, 255, 0.25);
        background: rgba(94, 194, 255, 0.1);
        color: #dff4ff;
        font-size: 12px;
      }

      .tabs {
        display: flex;
        gap: 10px;
        padding: 14px 22px 0;
      }

      .tab-btn {
        border: 1px solid rgba(39, 65, 94, 0.75);
        border-bottom: none;
        border-radius: 12px 12px 0 0;
        background: rgba(15, 28, 42, 0.78);
        color: var(--muted);
        padding: 10px 14px;
        cursor: pointer;
        font: inherit;
      }

      .tab-btn.is-active {
        background: var(--panel);
        color: var(--text);
      }

      .tab-panels {
        padding: 0 22px 22px;
      }

      .panel {
        display: none;
        border: 1px solid rgba(39, 65, 94, 0.75);
        border-radius: 0 16px 16px 16px;
        background: rgba(15, 28, 42, 0.94);
        min-height: 0;
      }

      .panel.is-active {
        display: block;
      }

      .panel-inner {
        padding: 18px;
      }

      .grid {
        display: grid;
        gap: 14px;
      }

      .grid.status {
        grid-template-columns: 1.3fr 1fr;
      }

      .grid.sessions {
        grid-template-columns: 320px 1fr;
      }

      .card {
        border: 1px solid rgba(39, 65, 94, 0.7);
        border-radius: 14px;
        background: rgba(19, 36, 55, 0.7);
        padding: 14px;
      }

      .card h2,
      .card h3 {
        margin: 0 0 10px;
        font-size: 13px;
        letter-spacing: 0.02em;
        text-transform: uppercase;
        color: #b9d7ff;
      }

      .mono {
        font-family: "Consolas", "Menlo", monospace;
        white-space: pre-wrap;
        word-break: break-word;
      }

      .ok {
        color: var(--good);
      }

      .warn {
        color: var(--warn);
      }

      .err {
        color: var(--bad);
      }

      .actions {
        display: flex;
        flex-wrap: wrap;
        gap: 8px;
      }

      button {
        border: 1px solid rgba(94, 194, 255, 0.28);
        border-radius: 8px;
        background: rgba(94, 194, 255, 0.12);
        color: var(--text);
        padding: 8px 12px;
        cursor: pointer;
        font: inherit;
      }

      button.secondary {
        background: rgba(15, 28, 42, 0.9);
      }

      button.danger {
        border-color: rgba(252, 165, 165, 0.35);
        background: rgba(127, 29, 29, 0.26);
      }

      button:disabled {
        opacity: 0.55;
        cursor: default;
      }

      .issues {
        margin: 0;
        padding-left: 20px;
      }

      .session-list {
        display: flex;
        flex-direction: column;
        gap: 8px;
        max-height: calc(100vh - 260px);
        overflow: auto;
      }

      .session-item {
        width: 100%;
        text-align: left;
        border: 1px solid rgba(39, 65, 94, 0.75);
        border-radius: 12px;
        background: rgba(10, 20, 30, 0.8);
        padding: 10px 12px;
      }

      .session-item.is-active {
        border-color: rgba(94, 194, 255, 0.7);
        background: rgba(25, 48, 71, 0.95);
      }

      .session-item strong {
        display: block;
        margin-bottom: 4px;
        color: #ebf6ff;
      }

      .session-item .meta {
        color: var(--muted);
        font-size: 12px;
      }

      .empty {
        color: var(--muted);
      }

      .session-detail-stack {
        display: grid;
        gap: 14px;
      }

      .session-scroll {
        max-height: calc(50vh - 80px);
        overflow: auto;
        padding-right: 4px;
      }

      .session-log {
        display: grid;
        gap: 8px;
      }

      .session-line,
      .session-raw-entry {
        padding: 8px 10px;
        border-radius: 10px;
        background: rgba(8, 17, 26, 0.72);
      }

      .session-line.user {
        border-left: 3px solid #5ec2ff;
      }

      .session-line.assistant {
        border-left: 3px solid #86efac;
      }

      .session-line.system {
        border-left: 3px solid #fde68a;
      }

      .session-raw-entry.stdout {
        border-left: 3px solid rgba(94, 194, 255, 0.8);
      }

      .session-raw-entry.stderr {
        border-left: 3px solid rgba(252, 165, 165, 0.9);
      }

      .session-line small,
      .session-raw-entry small {
        display: block;
        color: var(--muted);
        margin-bottom: 4px;
      }

      @media (max-width: 980px) {
        .grid.status,
        .grid.sessions {
          grid-template-columns: 1fr;
        }

        .session-list,
        .session-scroll {
          max-height: none;
        }
      }
    </style>
  </head>
  <body>
    <div class="app-shell">
      <header class="topbar">
        <div class="brand">
          <h1>Overleaf Assist</h1>
          <p>Persistent local bridge and project session monitor.</p>
        </div>
        <div class="top-meta">
          <span id="bridge-badge" class="badge">Checking bridge...</span>
          <span id="checked-at">Last checked: -</span>
        </div>
      </header>

      <nav class="tabs" aria-label="Desktop sections">
        <button class="tab-btn is-active" data-tab="status">Status</button>
        <button class="tab-btn" data-tab="sessions">Project Sessions</button>
      </nav>

      <main class="tab-panels">
        <section id="panel-status" class="panel is-active">
          <div class="panel-inner">
            <div class="grid status">
              <div class="grid">
                <div class="card">
                  <h2>Bridge Summary</h2>
                  <div id="summary" class="mono"></div>
                </div>
                <div class="card">
                  <h2>Diagnostics</h2>
                  <div id="doctor" class="mono"></div>
                  <ul id="issues" class="issues"></ul>
                </div>
              </div>
              <div class="grid">
                <div class="card">
                  <h2>Token Usage / Quota</h2>
                  <div id="token-metrics" class="mono"></div>
                </div>
                <div class="card">
                  <h2>Actions</h2>
                  <div class="actions">
                    <button id="retry-btn">Retry Diagnostics</button>
                    <button id="restart-btn" class="secondary">Restart Bridge</button>
                    <button id="login-btn" class="secondary">Run Codex Login</button>
                    <button id="docs-btn" class="secondary">Open Install Docs</button>
                  </div>
                </div>
              </div>
            </div>
          </div>
        </section>

        <section id="panel-sessions" class="panel">
          <div class="panel-inner">
            <div class="grid sessions">
              <div class="card">
                <h2>Projects</h2>
                <div class="actions" style="margin-bottom: 10px;">
                  <button id="sessions-refresh-btn">Refresh</button>
                </div>
                <div id="session-list" class="session-list"></div>
              </div>
              <div class="card">
                <h2>Session Detail</h2>
                <div id="session-meta" class="mono"></div>
                <div class="actions" style="margin: 12px 0;">
                  <button id="session-cancel-btn" class="secondary">Cancel Active Run</button>
                  <button id="session-delete-btn" class="danger">Delete Session</button>
                </div>
                <div class="session-detail-stack">
                  <div>
                    <h3>Shared Transcript</h3>
                    <div id="session-log" class="session-log session-scroll"></div>
                  </div>
                  <div>
                    <h3>Raw Codex CLI</h3>
                    <div id="session-raw-log" class="session-log session-scroll"></div>
                  </div>
                </div>
              </div>
            </div>
          </div>
        </section>
      </main>
    </div>

    <script src="./renderer.js"></script>
  </body>
</html>
